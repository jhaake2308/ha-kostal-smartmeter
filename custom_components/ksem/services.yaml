set_timebased_charge:
  name: Zeitbasierten Ladeplan setzen
  description: >
    Setzt Zeitfenster, in denen die Wallbox laden soll (Power Mode).
    Alle nicht abgedeckten Zeiten werden auf "nicht laden" gesetzt.
    Fenster über Mitternacht werden nicht unterstützt.
    Wochentag: 0=Sonntag, 1=Montag, 2=Dienstag, 3=Mittwoch, 4=Donnerstag, 5=Freitag, 6=Samstag.
  fields:
    windows:
      name: Ladefenster
      description: >
        Liste von Zeitfenstern. Jedes Fenster benötigt weekday (0–6),
        start (HH:MM) und end (HH:MM).
      required: true
      example: '[{"weekday": 4, "start": "03:00", "end": "05:00"}]'
      selector:
        object:

clear_timebased_charge:
  name: Zeitbasierten Ladeplan zurücksetzen
  description: >
    Setzt den gesamten Ladeplan zurück – alle 7 Tage werden auf "nicht laden" gesetzt.
